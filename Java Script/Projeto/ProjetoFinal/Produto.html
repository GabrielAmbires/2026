<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Patas e Companhia</title>
    <link rel="stylesheet" href="TelaPrincipal.css">
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <img src="Imagens/logo.png" alt="Patas e Companhia - Logo" class="navbar-logo">
            <a href="TelaPrincipal.html" class="navbar-link">Voltar</a>
        </nav>

        <main class="card product-page">
            <div class="section-title">
                <span>Produto</span>
                <h1 id="product-title">Produto selecionado</h1>
            </div>

            <div class="product-detail">
                <div class="product-visual">
                    <img id="product-image" src="Produtos img/racao.png" alt="Produto da loja">
                </div>

                <div class="product-info">
                    <p class="product-tag" id="product-tag">Linha premium</p>
                    <h2 id="product-name">Ração</h2>
                    <p id="product-description">Produto selecionado para o cuidado diário do seu pet.</p>

                    <div class="product-benefits" id="product-benefits"></div>

                    <div class="product-actions">
                        <a href="TelaPrincipal.html#loja" class="outline-link">Ver outros produtos</a>
                        <a href="Cadastro.html" class="primary-link">Tenho interesse</a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <div>
                <p><strong>Patas e Companhia</strong></p>
                <p>Rua General Furtado Nascimento, 66 Alto de Pinheiros, São Paulo - SP, 05465070</p>
            </div>
            <div class="social-links">
                <a href="#" aria-label="Instagram">Instagram</a>
                <a href="#" aria-label="Facebook">Facebook</a>
                <a href="#" aria-label="TikTok">TikTok</a>
            </div>
        </footer>
    </div>

    <script src="Produto.js"></script>
</body>
</html>
